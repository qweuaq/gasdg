name: Build Installers

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: am-am-vpn

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: am-am-vpn/src-tauri -> target

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: am-am-vpn/package-lock.json

      # Linux dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      - name: Build Tauri application
        run: npx tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      # Upload platform-specific artifacts
      - name: Upload Windows installer (EXE — NSIS)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis-installer
          path: am-am-vpn/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

      - name: Upload Windows installer (MSI)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi-installer
          path: am-am-vpn/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

      - name: Upload macOS installer (DMG)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-${{ matrix.target }}
          path: am-am-vpn/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload Linux installer (AppImage)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: am-am-vpn/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

      - name: Upload Linux installer (deb)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: am-am-vpn/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb

  # Create GitHub Release on every push to main or when a v* tag is pushed
  release:
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: find artifacts -type f | head -50

      # Release for v* tags — versioned release
      - name: Create versioned GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          name: "Am-Am VPN ${{ github.ref_name }}"
          body: |
            ## 📦 Скачать установщик / Download Installer

            | Платформа | Файл |
            |-----------|------|
            | 🪟 Windows (EXE) | `Am-Am-VPN_*_x64-setup.exe` |
            | 🪟 Windows (MSI) | `Am-Am-VPN_*_x64_en-US.msi` |
            | 🍎 macOS (Apple Silicon) | `Am-Am-VPN_*_aarch64.dmg` |
            | 🍎 macOS (Intel) | `Am-Am-VPN_*_x64.dmg` |
            | 🐧 Linux (AppImage) | `Am-Am-VPN_*_amd64.AppImage` |
            | 🐧 Linux (deb) | `Am-Am-VPN_*_amd64.deb` |

            ### Установка на Windows
            1. Скачайте `.exe` файл ниже
            2. Запустите установщик
            3. Следуйте инструкциям мастера установки (Далее → Далее → Установить)
            4. Готово! Запустите Am-Am VPN из меню Пуск
          files: artifacts/**/*

      # Release for main branch — always-updated "latest" release
      - name: Create/update latest GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Am-Am VPN — Последняя сборка / Latest Build"
          draft: false
          prerelease: false
          make_latest: true
          body: |
            ## 📦 Скачать установщик / Download Installer

            Эта сборка обновляется автоматически при каждом изменении.

            | Платформа | Файл |
            |-----------|------|
            | 🪟 **Windows (EXE)** | `Am-Am-VPN_*_x64-setup.exe` |
            | 🪟 **Windows (MSI)** | `Am-Am-VPN_*_x64_en-US.msi` |
            | 🍎 **macOS (Apple Silicon)** | `Am-Am-VPN_*_aarch64.dmg` |
            | 🍎 **macOS (Intel)** | `Am-Am-VPN_*_x64.dmg` |
            | 🐧 **Linux (AppImage)** | `Am-Am-VPN_*_amd64.AppImage` |
            | 🐧 **Linux (deb)** | `Am-Am-VPN_*_amd64.deb` |

            ### 🪟 Установка на Windows
            1. Скачайте файл `Am-Am-VPN_*_x64-setup.exe` ниже
            2. Запустите скачанный `.exe` файл
            3. Следуйте инструкциям мастера установки (Далее → Далее → Установить)
            4. Готово! Запустите **Am-Am VPN** из меню Пуск или с рабочего стола
          files: artifacts/**/*
